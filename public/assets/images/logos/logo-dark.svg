  <path d="M 15,34 A 15,15 0 0,1 45,34" fill="none" stroke="#AADD00" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 12,34 A 18,18 0 0,1 48,34" fill="none" stroke="#AADD00" stroke-width="2.2" stroke-linecap="round"/>
